name: fuzz

on:
  push:
    branches: [master]
    paths:
      - "fuzz/**"
      - "crates/guard-core-engine/**"
      - ".github/workflows/fuzz.yml"
  pull_request:
    paths:
      - "fuzz/**"
      - "crates/guard-core-engine/**"
      - ".github/workflows/fuzz.yml"

jobs:
  build:
    name: Build fuzz targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rustfmt

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Build fuzz targets
        run: cargo +nightly fuzz build

  smoke:
    name: Short fuzz run (60s per target)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Fuzz preprocessor (60s)
        run: cargo +nightly fuzz run fuzz_preprocess -- -max_total_time=60

      - name: Fuzz semantic (60s)
        run: cargo +nightly fuzz run fuzz_semantic -- -max_total_time=60

      - name: Fuzz compiler (60s)
        run: cargo +nightly fuzz run fuzz_compiler -- -max_total_time=60
