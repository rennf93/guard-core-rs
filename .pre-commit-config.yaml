repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo +nightly fmt
        entry: cargo +nightly fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets --exclude guard-core-python -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test --no-run
        entry: cargo test --workspace --no-run
        language: system
        types: [rust]
        pass_filenames: false

      - id: forbidden-allow-attr
        name: forbidden #[allow(...)] attribute
        entry: '#\[allow\('
        language: pygrep
        types: [rust]
        exclude: ^(tests/|fuzz/)
